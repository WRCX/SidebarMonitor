# Release build: on a version tag (v1.3.0), build the AOT agent + native shims, package the WiX MSI,
# sign it with SignPath (if configured), and publish a GitHub Release with the MSI attached.
#
# ── One-time setup required in the repo before this works ──────────────────────────────────────────
#
# 1. The AMD SDK bits are proprietary and CANNOT live in this repo. Bundle them into ONE zip that,
#    extracted at the repo root, provides:
#       native/RyzenSdk/        Platform.dll, Device.dll, MSVCP140.dll, VCRUNTIME140*.dll,
#                               AMDRyzenMasterDriver.sys/.inf/.cat, License.rtf   (packaged into the MSI)
#       native/AdlxSdk/SDK/     ADLX SDK headers: Include/, ADLXHelper/, Platform/  (to compile AdlxShim)
#       amd-cpu-sdk/include/    AMD Ryzen Master Monitoring SDK headers            (to compile RyzenShim)
#         Compress-Archive native/RyzenSdk,native/AdlxSdk/SDK,amd-cpu-sdk amdsdk.zip
#    Store that zip PRIVATELY (it's ~2 MB, too big for a GitHub secret) and give this workflow a way to
#    fetch it. Simplest: upload amdsdk.zip as an asset of a release in a PRIVATE companion repo, then set
#       secret  AMD_SDK_REPO_TOKEN   (a PAT with read access to that private repo)
#       vars    AMD_SDK_REPO         (e.g. WRCX/sidebarmonitor-amdsdk)
#                AMD_SDK_ASSET        (e.g. amdsdk.zip)
#    and this workflow downloads it with `gh release download`. Swap in any other private retrieval you
#    prefer (Azure blob + SAS, git-crypt, self-hosted runner with the SDK preinstalled, …).
#
# 2. SignPath (optional — the release still builds unsigned without it). Once approved for the
#    SignPath Foundation OSS program, set:
#       secret  SIGNPATH_API_TOKEN
#       vars    SIGNPATH_ORG_ID, SIGNPATH_PROJECT_SLUG, SIGNPATH_POLICY_SLUG
#
# ── Cutting a release ──────────────────────────────────────────────────────────────────────────────
#    Bump Version/FileVersion in Directory.Build.props, commit, then:  git tag v1.3.0 && git push --tags
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.3.0), for manual runs'
        required: true

permissions:
  contents: write   # to create the GitHub Release

jobs:
  release:
    # Skip the whole job until the private AMD SDK source is configured (see the header). Without it the
    # build can't fetch AMD's proprietary bits and would fail on every tag; guarding on the AMD_SDK_REPO
    # variable makes the run a clean SKIP instead of a red failure + email. Set that repo variable (and
    # the AMD_SDK_REPO_TOKEN secret) to turn CI releases on. Until then, cut releases manually
    # (installer/build.ps1 + `gh release create`).
    if: ${{ vars.AMD_SDK_REPO != '' }}
    runs-on: windows-latest
    # secrets can't be read in a step-level `if`; surface presence as a job env flag instead.
    env:
      HAS_SIGNPATH: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME -replace '^v','' }
               else { '${{ github.event.inputs.version }}' }
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $v"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup MSVC (for the native shims)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install WiX v5
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          wix extension add -g WixToolset.UI.wixext/5.0.2
          # Util supplies WixQuietExec, which runs the stop/purge actions windowless (they are
          # impersonated, so a plain exe action pops a console in the user's face).
          wix extension add -g WixToolset.Util.wixext/5.0.2

      - name: Fetch AMD SDK (private)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.AMD_SDK_REPO_TOKEN }}
          AMD_SDK_REPO: ${{ vars.AMD_SDK_REPO }}
          AMD_SDK_ASSET: ${{ vars.AMD_SDK_ASSET }}
        run: |
          if (-not $env:GH_TOKEN) { throw 'AMD_SDK_REPO_TOKEN secret is not set — see this workflow''s header.' }
          gh release download --repo $env:AMD_SDK_REPO --pattern $env:AMD_SDK_ASSET --dir $env:RUNNER_TEMP
          Expand-Archive (Join-Path $env:RUNNER_TEMP $env:AMD_SDK_ASSET) -DestinationPath . -Force
          # RyzenShim's build.cmd looks here for the CPU SDK headers.
          "AMDRMMONITORSDKPATH=$env:GITHUB_WORKSPACE\amd-cpu-sdk\" | Out-File $env:GITHUB_ENV -Append

      - name: Build native shims
        shell: cmd
        run: |
          call native\RyzenShim\build.cmd || exit /b 1
          call native\AdlxShim\build.cmd  || exit /b 1

      - name: Fetch PresentMon (MIT)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./native/PresentMon/fetch.ps1

      - name: Build MSIs (full + lite)
        shell: pwsh
        run: |
          # Full = AMD binaries bundled (works offline). Lite = none of AMD's binaries redistributed;
          # uses the AMD SDK the user installs. Build full first (it stages the AMD files), then lite
          # (-SkipPublish reuses the stage and prunes them).
          ./installer/build.ps1 -Version ${{ steps.ver.outputs.version }}
          ./installer/build.ps1 -Version ${{ steps.ver.outputs.version }} -Lite -SkipPublish

      # SignPath signs an *uploaded* artifact and returns the signed copies. Both MSIs go in one
      # artifact; configure the SignPath project's artifact "msi" to sign every *.msi it contains.
      - name: Upload unsigned MSIs
        if: env.HAS_SIGNPATH == 'true'
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: SidebarMonitor-msi
          path: installer/out/*.msi

      - name: Sign MSIs (SignPath)
        if: env.HAS_SIGNPATH == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: msi
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: installer/out   # overwrites with the signed MSIs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SidebarMonitor ${{ steps.ver.outputs.version }}
          files: installer/out/*.msi   # SidebarMonitor.msi (full) + SidebarMonitor-lite.msi
          generate_release_notes: true
          draft: true   # review + fill winget manifest, then publish
