ShortDescription: A native, always-on system monitor sidebar for Windows 11 — built for Ryzen + NVIDIA, and still working with Memory Integrity (HVCI) enabled.
Description: |-
  SidebarMonitor is a lean, always-visible monitoring sidebar for Windows 11. Unlike WinRing0-based
  tools that stopped working when Windows blocklisted that driver, it reads sensors through paths
  that are signed and HVCI-safe: the AMD Ryzen Master Monitoring SDK, NVML, ADLX and native Windows
  APIs. It shows CPU (deep Ryzen per-core clocks/temps/C0, throttle, power caps), GPU (NVIDIA and
  AMD full telemetry plus per-engine activity), memory, per-process network, per-disk temperature,
  and top processes. The sampling agent is a NativeAOT binary; no telemetry leaves the machine.
